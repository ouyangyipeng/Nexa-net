# Prometheus Configuration for Nexa-net
# Scrape metrics from Nexa-Proxy and Supernode

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nexa-net'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts.yml"

scrape_configs:
  # Nexa-Proxy metrics
  - job_name: 'nexa-proxy'
    static_configs:
      - targets: ['nexa-proxy:9090']
    metrics_path: '/metrics'
    scheme: http

  # Supernode metrics
  - job_name: 'nexa-supernode'
    static_configs:
      - targets: ['supernode:9091']
    metrics_path: '/metrics'
    scheme: http

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis exporter (if using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scheme: http

  # PostgreSQL exporter (if using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scheme: http